# example variable definition for Biomass imports/exports
# - Trade|Primary Energy|Biomass|Volume:
#     description: net exports of solid, unprocessed biomass, at the global level these
#       should add up to the trade losses only
#     unit: GWh
#     eb_var: EXP|BIOE

- Final Energy:
    description: total final energy consumption by all end-use sectors and all fuels,
      excluding transmission/distribution losses, excluding non-energy use, excluding
      bunkers, excluding ambient heat
    unit: GWh
    nrg: FC_E  # Final consumption - energy use (uses FC_E per eurostat_nrg_present)
    siec: TOTAL
    value: 279335.902

- Final Energy|Agriculture:
    description: total final energy consumption by the agriculture sector
    unit: GWh
    nrg: FC_OTH_AF_E  # Agriculture and forestry final consumption
    siec: TOTAL
    value: 4558.036

- Final Energy|Electricity:
    description: final energy consumption of electricity (including on-site solar
      PV), excluding transmission/distribution losses
    unit: GWh
    nrg: FC_E  # Final consumption energy 
    siec: E7000 # - electricity across all sectors
    value: 63260.630

- Final Energy|Solids:
    description: final energy solid fuel consumption (coal and solid biomass),
      excl. non-energy feedstocks
    unit: GWh
    nrg: FC_E  # Final consumption - solids across all sectors
    siec: BIOE,C0000X0350-0370,P1000  # Bioenergy, solid fossil fuels (aggregate), peat
    value: 64986.114

- Final Energy|Solids|Biomass:
    description: final energy consumption of solid biomass (modern and traditional,
      including renewable waste), excluding final energy consumption of bioliquids
      which are reported in the liquids category, incl. non-energy feedstocks
    unit: GWh
    nrg: FC_E  # Final consumption - solid biomass
    siec: BIOE
    value: 62388.302

- Final Energy|Solids|Coal:
    description: final energy coal consumption, excl. non-energy feedstocks
    unit: GWh
    nrg: FC_E  # Final consumption
    siec: C0000X0350-0370,P1000
    value: 575.712
  
- Final Energy|Gases:
    description: final energy consumption of gases (natural gas, biogas, coal-gas),
      excluding transmission/distribution losses, excl. non-energy feedstocks
    unit: GWh
    nrg: FC_E  # Final consumption - gases across all sectors
    siec: G3000,R5300,C0350-0370  # Natural gas, biogases, manufactured gases (aggregate)
    value: 70099.779

- Final Energy|Liquids:
    description: "final energy consumption of refined liquids (conventional & unconventional oil, biofuels, coal-to-liquids, gas-to-liquids, efuels), excl. non-energy feedstocks, excl. bunkers - NOTE: seems like eurostat energy balance natively includes international aviation and marine bunkers in this cathegory"
    unit: GWh
    nrg: FC_E  # Final consumption - liquids across all sectors
    siec: O4630,O4651,O4652XR5210B,O4653,O4661XR5230B,O4669,O4671XR5220B,O4680,R5210P,R5210B,R5220P,R5220B,R5230P,R5230B,R5290
    value: 26918.792

- Final Energy|Heat:
    description: final energy consumption of heat (e.g., district heat, process heat,
      warm water), excluding transmission/distribution losses, excluding direct geothermal
      and solar heating
    unit: GWh
    nrg: FC_E  # Final consumption - heat across all sectors (use FC_OTH_* for sector splits)
    siec: H8000
    value: 6370.728

- Final Energy|Solar:
    description: final energy consumption of solar energy (e.g., from roof-top solar
      hot water collector systems)
    unit: GWh
    nrg: FC_E  # Final consumption - solar thermal & PV across all sectors
    siec: RA410,RA420  # Solar thermal and photovoltaic
    value: 10309.93

- Final Energy|Geothermal:
    description: final energy consumption of geothermal energy (e.g., from decentralized
      or small-scale geothermal heating systems) EXCLUDING geothermal heat pumps
    unit: GWh
    nrg: FC_E
    siec: RA200
    value: 155.361


- Final Energy|Waste:
    description: final energy consumption of non-renewable waste
    unit: GWh
    nrg: FC_E
    siec: W6100_6220 # sum of W6100 and W6220
    value: 2787.302

